 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бросила и смогла</title>
    <!-- ПРАВИЛЬНЫЙ СКРИПТ TELEGRAM -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-bg: #f9f9fa;
            --tg-text: #1c1c1e;
            --tg-hint: #8e8e93;
            --tg-primary: #5856d6;
            --tg-primary-text: #ffffff;
            --card-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-glow: rgba(88, 86, 214, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            font-size: 15px;
        }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 22px; font-weight: 700; margin: 0 0 6px 0; }
        header p { font-size: 13px; color: var(--tg-hint); margin: 0; font-style: italic; }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--tg-hint);
            margin: 20px 0 10px 4px;
            font-weight: 600;
        }

        .templates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .template-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .template-card h3 { margin: 0 0 4px 0; font-size: 14px; }
        .template-card p { margin: 0; font-size: 11px; color: var(--tg-hint); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .weekday { text-align: center; font-size: 11px; font-weight: 600; color: var(--tg-hint); padding-bottom: 4px; }

        .day-cell {
            aspect-ratio: 1;
            background: var(--tg-bg);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .day-num { font-size: 12px; font-weight: 500; }
        .day-status { font-size: 10px; margin-top: 2px; height: 12px; }

        .day-cell.has-workout { border-color: var(--tg-primary); }
        .day-cell.completed { background: var(--tg-primary); color: var(--tg-primary-text); }

        .manager-panel {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 16px;
            margin-top: 20px;
            display: none;
        }
        .manager-panel h3 { margin: 0 0 12px 0; font-size: 16px; }
        .panel-actions { display: flex; gap: 10px; }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn-primary { background: var(--tg-primary); color: var(--tg-primary-text); }
        .btn-secondary { background: var(--tg-bg); color: var(--tg-text); border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <header>
        <h1>Бросила и смогла</h1>
        <p>Дисциплина — это про любовь к себе ✨</p>
    </header>

    <div class="section-title">1. Готовые шаблоны</div>
    <div class="templates-grid">
        <div class="template-card" onclick="applyTemplate('busy')">
            <h3>🏃‍♀️ Для занятых</h3>
            <p>10 тренировок в месяц.</p>
        </div>
        <div class="template-card" onclick="applyTemplate('intense')">
            <h3>⚡️ Интенсив</h3>
            <p>Через день.</p>
        </div>
    </div>

    <div class="section-title">2. График на 28 дней</div>
    <div class="calendar-grid">
        <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
        <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
        <div id="calendarCells" style="display: contents;"></div>
    </div>

    <div class="manager-panel" id="managerPanel">
        <h3 id="panelTitle">День Х</h3>
        <div class="panel-actions">
            <button class="btn btn-secondary" id="toggleWorkoutBtn" onclick="toggleWorkout()">Запланировать</button>
            <button class="btn btn-primary" id="toggleCompleteBtn" onclick="toggleComplete()">Выполнено</button>
        </div>
    </div>

    <div style="margin-top: 24px;">
        <button class="btn btn-primary" style="width: 100%;" onclick="saveData()">Сохранить план</button>
    </div>

    <script>
        // Инициализация Telegram объекта
        let tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        
        if (tg) {
            tg.ready();
            tg.expand();
        }

        let planData = Array.from({ length: 28 }, (_, i) => ({
            day: i + 1,
            hasWorkout: false,
            completed: false
        }));

        let selectedDayIndex = null;

        function renderCalendar() {
            const container = document.getElementById('calendarCells');
            container.innerHTML = '';

            planData.forEach((dayData, index) => {
                const cell = document.createElement('div');
                cell.className = `day-cell`;
                if (dayData.hasWorkout) cell.classList.add('has-workout');
                if (dayData.completed) cell.classList.add('completed');
                
                let statusIcon = '';
                if (dayData.completed) statusIcon = '✅';
                else if (dayData.hasWorkout) statusIcon = '💪';

                cell.innerHTML = `
                    <span class="day-num">${dayData.day}</span>
                    <span class="day-status">${statusIcon}</span>
                `;

                cell.onclick = () => openDayManager(index);
                container.appendChild(cell);
            });
        }

        function applyTemplate(type) {
            planData.forEach((day, i) => {
                day.completed = false;
                if (type === 'busy') {
                    day.hasWorkout = (i % 7 === 2 || i % 7 === 5);
                } else if (type === 'intense') {
                    day.hasWorkout = (i % 2 === 0);
                }
            });
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('managerPanel').style.display = 'none';
            renderCalendar();
        }

        function openDayManager(index) {
            selectedDayIndex = index;
            const dayData = planData[index];
            document.getElementById('panelTitle').innerText = `День ${dayData.day}`;
            
            const workoutBtn = document.getElementById('toggleWorkoutBtn');
            const completeBtn = document.getElementById('toggleCompleteBtn');

            workoutBtn.innerText = dayData.hasWorkout ? 'Убрать план' : 'Запланировать';
            completeBtn.style.display = dayData.hasWorkout ? 'block' : 'none';
            completeBtn.innerText = dayData.completed ? 'Сбросить' : 'Выполнено';

            document.getElementById('managerPanel').style.display = 'block';
        }

        function toggleWorkout() {
            if (selectedDayIndex === null) return;
            const day = planData[selectedDayIndex];
            day.hasWorkout = !day.hasWorkout;
            if (!day.hasWorkout) day.completed = false;
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            openDayManager(selectedDayIndex);
            renderCalendar();
        }

        function toggleComplete() {
            if (selectedDayIndex === null) return;
            const day = planData[selectedDayIndex];
            day.completed = !day.completed;
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            openDayManager(selectedDayIndex);
            renderCalendar();
        }

        function saveData() {
            const total = planData.filter(d => d.hasWorkout).length;
            const done = planData.filter(d => d.completed).length;
            const summary = { text: `Всего тренировок: ${total}, выполнено: ${done}!` };

            if (tg) {
                tg.sendData(JSON.stringify(summary));
                tg.close();
            } else {
                alert("План сохранен локально: " + summary.text);
            }
        }

        renderCalendar();
    </script>
</body>
</html>
