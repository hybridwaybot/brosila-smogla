<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дневник питания</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --color-dark-green: #14221b; --color-beige: #d9d2c5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-dark-green); color: var(--color-beige); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .btn-primary { background-color: var(--color-beige); color: var(--color-dark-green); font-weight: 600; transition: all 0.2s ease; }
        .btn-primary:active { transform: scale(0.96); }
        .progress-bar { height: 8px; border-radius: 4px; background: rgba(217, 210, 197, 0.15); overflow: hidden; }
        .progress-fill { height: 100%; background: var(--color-beige); transition: width 0.4s ease; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(217, 210, 197, 0.2); color: var(--color-beige); border-radius: 12px; padding: 14px; width: 100%; outline: none; font-size: 16px; }
        input:focus { border-color: var(--color-beige); }
        datalist { background-color: var(--color-dark-green); color: var(--color-beige); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; position: relative; }
        .calendar-day.active { background: var(--color-beige); color: var(--color-dark-green); font-weight: bold; }
        .calendar-day.has-data::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: currentColor; border-radius: 50%; opacity: 0.5; }
        .water-drop { transition: all 0.3s ease; }
        .water-drop.filled { color: #3b82f6; fill: #3b82f6; }
    </style>
</head>
<body class="p-4">
    <div id="sub-overlay" class="fixed inset-0 z-50 bg-[#14221b] flex flex-col items-center justify-center p-8 text-center hidden">
        <h2 class="text-3xl mb-4 text-beige">Сообщество Гибридный цех</h2>
        <p class="mb-8 opacity-70 text-beige">Подпишитесь на канал и начинай</p>
        <a href="https://t.me/hybriddepartment" target="_blank" class="btn-primary py-4 px-8 rounded-full w-full mb-4 text-center">Подписаться</a>
        <button onclick="checkSubscription()" class="text-beige border border-beige/30 py-3 px-8 rounded-full w-full">Проверить подписку</button>
    </div>

    <div id="app-container" class="max-w-md mx-auto pb-24">
        <header class="flex justify-between items-center mb-8">
            <div><h1 class="text-2xl tracking-wider uppercase">Hybrid</h1><p class="text-[10px] opacity-50 uppercase tracking-[0.2em]">Дневник питания 2.0</p></div>
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-beige/10 border border-beige/20 overflow-hidden"><img id="avatar-img" src="" class="w-full h-full object-cover hidden"></div>
        </header>

        <!-- Dashboard -->
        <section id="dashboard-view" class="tab-content active">
            <div class="glass-card p-6 mb-6">
                <div class="flex justify-between items-end mb-4">
                    <div><p class="text-[10px] opacity-50 uppercase mb-1">Осталось калорий</p><h2 class="text-5xl font-bold" id="calories-left">0</h2></div>
                    <div class="text-right"><p class="text-[10px] opacity-50 uppercase mb-1">Цель</p><p class="text-xl" id="calories-target">0</p></div>
                </div>
                <div class="progress-bar mb-6"><div id="calories-progress" class="progress-fill" style="width: 0%"></div></div>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div><p class="text-[9px] opacity-50 uppercase mb-1">Белки</p><div class="progress-bar h-1 mb-1"><div id="p-progress" class="progress-fill" style="width: 0%"></div></div><p class="text-[11px]"><span id="p-current">0</span>/<span id="p-target">0</span>г</p></div>
                    <div><p class="text-[9px] opacity-50 uppercase mb-1">Жиры</p><div class="progress-bar h-1 mb-1"><div id="f-progress" class="progress-fill" style="width: 0%"></div></div><p class="text-[11px]"><span id="f-current">0</span>/<span id="f-target">0</span>г</p></div>
                    <div><p class="text-[9px] opacity-50 uppercase mb-1">Углеводы</p><div class="progress-bar h-1 mb-1"><div id="c-progress" class="progress-fill" style="width: 0%"></div></div><p class="text-[11px]"><span id="c-current">0</span>/<span id="c-target">0</span>г</p></div>
                </div>
                <div class="pt-4 border-t border-white/10">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[10px] opacity-50 uppercase">Вода</p>
                        <p class="text-[11px]"><span id="water-current">0</span> / <span id="water-target">0</span> мл</p>
                    </div>
                    <div class="flex justify-between" id="water-drops">
                        <!-- Drops will be here -->
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4"><h3 class="text-xl">Дневник</h3><button onclick="showTab('manual')" class="btn-primary px-5 py-2.5 rounded-full text-[10px] uppercase font-bold tracking-wider">+ Добавить</button></div>
            <div id="diary-list" class="space-y-3"></div>
        </section>

        <!-- Manual Add -->
        <section id="manual-view" class="tab-content">
            <h2 class="text-3xl mb-6">Добавить еду</h2>
            <div class="glass-card p-6 space-y-4">
                <div>
                    <label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Название продукта</label>
                    <input type="text" id="m-name" list="food-suggestions" placeholder="Начните вводить..." oninput="checkFoodDB(this.value)">
                    <datalist id="food-suggestions"></datalist>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Вес (г)</label><input type="number" id="m-weight" value="100" oninput="recalcManual()"></div>
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Кал / 100г</label><input type="number" id="m-k" oninput="recalcManual()"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Б / 100г</label><input type="number" id="m-p" oninput="recalcManual()"></div>
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Ж / 100г</label><input type="number" id="m-f" oninput="recalcManual()"></div>
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">У / 100г</label><input type="number" id="m-c" oninput="recalcManual()"></div>
                </div>
                <div class="p-5 bg-white/5 rounded-2xl text-center border border-white/5">
                    <p class="text-[10px] opacity-40 uppercase mb-1">Итого в порции</p>
                    <p id="m-total" class="font-bold text-3xl text-beige">0 ккал</p>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="showTab('dashboard')" class="flex-1 py-4 border border-beige/20 rounded-xl uppercase text-[10px] font-bold tracking-widest">Назад</button>
                    <button onclick="saveManual()" class="flex-[2] btn-primary py-4 rounded-xl uppercase text-[10px] font-bold tracking-widest">Добавить</button>
                </div>
            </div>
        </section>

        <!-- Stats -->
        <section id="stats-view" class="tab-content">
            <h2 class="text-3xl mb-6">Статистика</h2>
            <div id="stats-container" class="space-y-4">
                <!-- Сюда будет динамически подгружаться календарь/история -->
            </div>
        </section>

        <!-- Diets -->
        <section id="diets-view" class="tab-content">
            <h2 class="text-3xl mb-6">Примеры диет</h2>
            <div id="diets-container" class="space-y-4">
                <!-- Сюда будут подгружаться примеры диет -->
            </div>
        </section>

        <!-- Profile -->
        <section id="profile-view" class="tab-content">
            <h2 class="text-3xl mb-6">Профиль</h2>
            <div class="glass-card p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Пол</label><select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Возраст</label><input type="number" id="age" placeholder="25"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Вес (кг)</label><input type="number" id="weight" placeholder="75"></div>
                    <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Рост (см)</label><input type="number" id="height" placeholder="180"></div>
                </div>
                <div><label class="text-[10px] opacity-50 block mb-1 uppercase tracking-wider">Активность</label><select id="activity"><option value="1.2">Минимальная</option><option value="1.375">Слабая</option><option value="1.55">Средняя</option><option value="1.725">Высокая</option><option value="1.9">Экстремальная</option></select></div>
                <button onclick="saveProfile()" class="btn-primary w-full py-4 rounded-xl mt-4 uppercase text-[10px] font-bold tracking-widest">Сохранить данные</button>
            </div>
        </section>

        <nav class="fixed bottom-6 left-4 right-4 h-20 glass-card flex items-center justify-around px-4">
            <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center transition-all" id="nav-dashboard"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span class="text-[9px] uppercase mt-1 font-bold">Дневник</span></button>
            <button onclick="showTab('stats')" class="nav-btn flex flex-col items-center opacity-40" id="nav-stats"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span class="text-[9px] uppercase mt-1 font-bold">Статистика</span></button>
            <button onclick="showTab('diets')" class="nav-btn flex flex-col items-center opacity-40" id="nav-diets"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span class="text-[9px] uppercase mt-1 font-bold">Диеты</span></button>
            <button onclick="showTab('profile')" class="nav-btn flex flex-col items-center opacity-40" id="nav-profile"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span class="text-[9px] uppercase mt-1 font-bold">Профиль</span></button>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userProfile = null, diary = [], currentViewDate = getTodayKey(), waterIntake = 0;
        const BOT_TOKEN = '8821569325:AAEz0hGIVdG1Ti3lCNuR9twOxre_uDqFHRI';
        const CHANNEL_ID = '@hybriddepartment';

        const FOOD_DB = [
            {n:"Куриная грудка (отварная)", k:165, p:31, f:3.6, c:0},
            {n:"Куриная грудка (жареная)", k:210, p:28, f:10, c:0},
            {n:"Говядина отварная", k:254, p:25, f:17, c:0},
            {n:"Свинина (вырезка)", k:142, p:19, f:7, c:0},
            {n:"Индейка (филе)", k:115, p:24, f:2, c:0},
            {n:"Яйцо вареное (1 шт)", k:75, p:6.5, f:5, c:0.5},
            {n:"Омлет из 2 яиц", k:154, p:11, f:12, c:0.6},
            {n:"Рис отварной", k:130, p:2.7, f:0.3, c:28},
            {n:"Гречка отварная", k:110, p:4.2, f:1.1, c:21},
            {n:"Макароны (тв. сорта)", k:158, p:5.8, f:0.9, c:31},
            {n:"Овсянка на воде", k:88, p:3, f:1.7, c:15},
            {n:"Картофель отварной", k:82, p:2, f:0.4, c:17},
            {n:"Картофель фри", k:312, p:3.4, f:15, c:41},
            {n:"Творог 5%", k:121, p:17, f:5, c:3},
            {n:"Кефир 1%", k:40, p:3, f:1, c:4},
            {n:"Молоко 2.5%", k:54, p:3, f:2.5, c:4.7},
            {n:"Сыр Российский", k:363, p:23, f:29, c:0},
            {n:"Яблоко", k:52, p:0.3, f:0.2, c:14},
            {n:"Банан", k:89, p:1.1, f:0.3, c:23},
            {n:"Огурец", k:15, p:0.8, f:0.1, c:3},
            {n:"Помидор", k:18, p:0.9, f:0.2, c:3.9},
            {n:"Авокадо", k:160, p:2, f:15, c:9},
            {n:"Миндаль", k:579, p:21, f:50, c:22},
            {n:"Грецкий орех", k:654, p:15, f:65, c:14},
            {n:"Лосось (семга)", k:208, p:20, f:13, c:0},
            {n:"Тунец консерв.", k:116, p:26, f:1, c:0},
            {n:"Протеин (1 черпак)", k:120, p:24, f:1.5, c:3},
            {n:"Хлеб цельнозерновой", k:247, p:13, f:3.4, c:41},
            {n:"Масло оливковое", k:884, p:0, f:100, c:0},
            {n:"Кофе без сахара", k:2, p:0.2, f:0, c:0},
            {n:"Борщ", k:49, p:3, f:2.2, c:4.3},
            {n:"Цезарь с курицей", k:180, p:12, f:10, c:8}
        ];

        function init() {
            checkSubscription();
            loadUserData();
            populateSuggestions();
            if (tg.initDataUnsafe?.user?.photo_url) {
                const img = document.getElementById('avatar-img');
                img.src = tg.initDataUnsafe.user.photo_url;
                img.classList.remove('hidden');
            }
            showTab(userProfile ? 'dashboard' : 'profile');
            updateUI();
        }

        function populateSuggestions() {
            const list = document.getElementById('food-suggestions');
            FOOD_DB.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.n;
                list.appendChild(opt);
            });
        }

        function checkFoodDB(val) {
            const food = FOOD_DB.find(f => f.n === val);
            if (food) {
                document.getElementById('m-k').value = food.k;
                document.getElementById('m-p').value = food.p;
                document.getElementById('m-f').value = food.f;
                document.getElementById('m-c').value = food.c;
                recalcManual();
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.add('opacity-40'));
            const nav = document.getElementById('nav-' + (tabId === 'manual' ? 'dashboard' : tabId));
            if(nav) nav.classList.remove('opacity-40');
            
            if(tabId === 'stats') renderCalendar();
            if(tabId === 'diets') renderDiets();
        }

        function renderCalendar() {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            
            const header = document.createElement('div');
            header.className = 'flex justify-between items-center mb-4';
            header.innerHTML = `<h3 class="text-xl">${monthNames[month]} ${year}</h3>`;
            container.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'calendar-grid glass-card p-4';
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            const weekDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            weekDays.forEach(d => {
                grid.innerHTML += `<div class="text-[10px] opacity-40 text-center pb-2">${d}</div>`;
            });

            for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;

            for(let d=1; d<=daysInMonth; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasData = localStorage.getItem('hybrid_diary_' + dateKey);
                const isToday = dateKey === getTodayKey();
                const isActive = dateKey === currentViewDate;
                
                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day ${isActive ? 'active' : ''} ${hasData ? 'has-data' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => {
                    currentViewDate = dateKey;
                    loadUserData(dateKey);
                    showTab('dashboard');
                    updateUI();
                };
                grid.appendChild(dayEl);
            }
            container.appendChild(grid);

            // Add Summary Card
            const summary = document.createElement('div');
            summary.className = 'glass-card p-6 mt-4';
            summary.innerHTML = `<h3 class="text-lg mb-2">Статистика за месяц</h3><p class="text-sm opacity-60">Функция детальной аналитики будет доступна в v2.1</p>`;
            container.appendChild(summary);
        }

        function renderDiets() {
            const container = document.getElementById('diets-container');
            const targetKcal = userProfile?.targets?.kcal || 2000;
            container.innerHTML = `<div class="p-4 bg-beige/10 rounded-xl mb-4"><p class="text-xs opacity-70">Планы подобраны под вашу цель: <b>${targetKcal} ккал</b></p></div>`;
            
            const dietPlans = [
                {
                    name: "Сбалансированный рацион",
                    desc: "30% Белки, 30% Жиры, 40% Углеводы",
                    meals: [
                        { t: "Завтрак", c: "Овсянка на молоке с ягодами", k: Math.round(targetKcal * 0.25) },
                        { t: "Обед", c: "Куриная грудка, бурый рис, салат", k: Math.round(targetKcal * 0.35) },
                        { t: "Ужин", c: "Лосось на пару и брокколи", k: Math.round(targetKcal * 0.30) },
                        { t: "Перекус", c: "Горсть орехов или яблоко", k: Math.round(targetKcal * 0.10) }
                    ]
                },
                {
                    name: "Низкоуглеводный (Кето-лайт)",
                    desc: "40% Белки, 50% Жиры, 10% Углеводы",
                    meals: [
                        { t: "Завтрак", c: "Яичница из 3 яиц с авокадо", k: Math.round(targetKcal * 0.30) },
                        { t: "Обед", c: "Стейк из говядины и зеленый салат", k: Math.round(targetKcal * 0.35) },
                        { t: "Ужин", c: "Запеченная скумбрия и спаржа", k: Math.round(targetKcal * 0.25) },
                        { t: "Перекус", c: "Творог 9% или сыр", k: Math.round(targetKcal * 0.10) }
                    ]
                }
            ];

            dietPlans.forEach(plan => {
                const card = document.createElement('div');
                card.className = 'glass-card p-5';
                let mealsHtml = '';
                plan.meals.forEach(m => {
                    mealsHtml += `<div class="flex justify-between text-xs border-b border-white/5 py-2"><span><b>${m.t}:</b> ${m.c}</span><span class="opacity-60">${m.k} ккал</span></div>`;
                });
                card.innerHTML = `<h3 class="text-lg mb-1">${plan.name}</h3><p class="text-[10px] opacity-50 uppercase mb-4">${plan.desc}</p>${mealsHtml}`;
                container.appendChild(card);
            });
        }

        function loadUserData(dateKey = getTodayKey()) {
            const saved = localStorage.getItem('hybrid_user_profile');
            if (saved) {
                userProfile = JSON.parse(saved);
                const savedDiary = localStorage.getItem('hybrid_diary_' + dateKey);
                diary = savedDiary ? JSON.parse(savedDiary) : [];
                const savedWater = localStorage.getItem('hybrid_water_' + dateKey);
                waterIntake = savedWater ? parseInt(savedWater) : 0;
            }
        }

        function saveProfile() {
            const age = document.getElementById('age').value, weight = document.getElementById('weight').value, height = document.getElementById('height').value;
            if (!age || !weight || !height) { tg.showAlert('Заполните все поля'); return; }
            userProfile = { gender: document.getElementById('gender').value, age: parseInt(age), weight: parseInt(weight), height: parseInt(height), activity: document.getElementById('activity').value };
            const bmr = userProfile.gender === 'male' ? (10 * userProfile.weight + 6.25 * userProfile.height - 5 * userProfile.age + 5) : (10 * userProfile.weight + 6.25 * userProfile.height - 5 * userProfile.age - 161);
            const tdee = bmr * parseFloat(userProfile.activity);
            userProfile.targets = { 
                kcal: Math.round(tdee), 
                p: Math.round(tdee * 0.3 / 4), 
                f: Math.round(tdee * 0.3 / 9), 
                c: Math.round(tdee * 0.4 / 4),
                water: Math.round(userProfile.weight * 35) // 35ml per kg
            };
            localStorage.setItem('hybrid_user_profile', JSON.stringify(userProfile));
            tg.HapticFeedback.notificationOccurred('success');
            showTab('dashboard');
            updateUI();
        }

        function getTodayKey() { return new Date().toISOString().split('T')[0]; }

        function updateUI() {
            if (!userProfile) return;
            const targets = userProfile.targets;
            const cur = diary.reduce((acc, i) => { acc.k += i.k; acc.p += i.p; acc.f += i.f; acc.c += i.c; return acc; }, {k:0, p:0, f:0, c:0});
            document.getElementById('calories-target').innerText = targets.kcal;
            document.getElementById('calories-left').innerText = Math.max(0, targets.kcal - Math.round(cur.k));
            document.getElementById('calories-progress').style.width = Math.min(100, (cur.k / targets.kcal) * 100) + '%';
            updateMacro('p', cur.p, targets.p); updateMacro('f', cur.f, targets.f); updateMacro('c', cur.c, targets.c);
            
            // Water UI
            document.getElementById('water-current').innerText = waterIntake;
            document.getElementById('water-target').innerText = targets.water || 2000;
            const waterDrops = document.getElementById('water-drops');
            waterDrops.innerHTML = '';
            const totalDrops = 8;
            const mlPerDrop = (targets.water || 2000) / totalDrops;
            for(let i=1; i<=totalDrops; i++) {
                const isFilled = waterIntake >= i * mlPerDrop;
                waterDrops.innerHTML += `<svg onclick="addWater(${i * mlPerDrop})" class="w-6 h-6 water-drop ${isFilled ? 'filled' : 'opacity-20'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c-4.418 0-8-3.582-8-8 0-4.418 8-11 8-11s8 6.582 8 11c0 4.418-3.582 8-8 8z"/></svg>`;
            }

            const list = document.getElementById('diary-list');
            list.innerHTML = diary.length ? '' : `<p class="text-center opacity-40 py-8 text-xs">Дневник на ${currentViewDate === getTodayKey() ? 'сегодня' : currentViewDate} пуст</p>`;
            diary.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'glass-card p-4 flex justify-between items-center';
                el.innerHTML = `<div><p class="font-semibold text-sm">${item.name} (${item.w}г)</p><p class="text-[10px] opacity-50 uppercase">${Math.round(item.k)} ккал | Б:${Math.round(item.p)} Ж:${Math.round(item.f)} У:${Math.round(item.c)}</p></div>` + 
                    (currentViewDate === getTodayKey() ? `<button onclick="removeItem(${idx})" class="opacity-30 p-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>` : '');
                list.appendChild(el);
            });
        }

        function addWater(amount) {
            waterIntake = amount;
            localStorage.setItem('hybrid_water_' + getTodayKey(), waterIntake);
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateMacro(id, cur, tar) {
            document.getElementById(id + '-current').innerText = Math.round(cur);
            document.getElementById(id + '-target').innerText = tar;
            document.getElementById(id + '-progress').style.width = Math.min(100, (cur / tar) * 100) + '%';
        }

        function removeItem(idx) { diary.splice(idx, 1); localStorage.setItem('hybrid_diary_' + getTodayKey(), JSON.stringify(diary)); updateUI(); }

        function recalcManual() {
            const w = parseFloat(document.getElementById('m-weight').value) || 0;
            const k = parseFloat(document.getElementById('m-k').value) || 0;
            document.getElementById('m-total').innerText = Math.round((k * w) / 100) + ' ккал';
        }

        function saveManual() {
            const name = document.getElementById('m-name').value, w = parseFloat(document.getElementById('m-weight').value), k = parseFloat(document.getElementById('m-k').value);
            if (!name || isNaN(w) || isNaN(k)) { tg.showAlert('Укажите название, вес и калории'); return; }
            const p = parseFloat(document.getElementById('m-p').value) || 0, f = parseFloat(document.getElementById('m-f').value) || 0, c = parseFloat(document.getElementById('m-c').value) || 0;
            diary.unshift({ name, w, k: (k * w) / 100, p: (p * w) / 100, f: (f * w) / 100, c: (c * w) / 100 });
            localStorage.setItem('hybrid_diary_' + getTodayKey(), JSON.stringify(diary));
            ['m-name', 'm-k', 'm-p', 'm-f', 'm-c'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('m-weight').value = 100;
            document.getElementById('m-total').innerText = '0 ккал';
            tg.HapticFeedback.notificationOccurred('success');
            showTab('dashboard');
            updateUI();
        }

        async function checkSubscription() {
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) return;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${CHANNEL_ID}&user_id=${userId}`);
                const data = await res.json();
                if (data.ok && !['member', 'administrator', 'creator'].includes(data.result.status)) {
                    document.getElementById('sub-overlay').classList.remove('hidden');
                } else {
                    document.getElementById('sub-overlay').classList.add('hidden');
                }
            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
